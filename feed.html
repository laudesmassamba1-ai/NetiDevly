<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevNet</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <div class="topbar">
    <div class="topbar-brand">DevNet<span class="accent">.</span></div>
    <a href="profile.html" class="icon-btn" id="myAv">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </a>
  </div>

  <div class="app">
    <div style="padding:.65rem .8rem">

      <!-- Compose -->
      <div class="compose">
        <div class="compose-top">
          <div class="av av-sm av-lime" id="myAvatar">?</div>
          <div class="compose-ghost" onclick="openSheet()">Quoi de neuf ?</div>
        </div>
        <div class="compose-btns">
          <button class="compose-btn" onclick="openSheet('text')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="4 7 4 4 20 4 20 7"/>
              <line x1="9" y1="20" x2="15" y2="20"/>
              <line x1="12" y1="4" x2="12" y2="20"/>
            </svg>
            <span>Texte</span>
          </button>
          <button class="compose-btn" onclick="openSheet('code')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="16 18 22 12 16 6"/>
              <polyline points="8 6 2 12 8 18"/>
            </svg>
            <span>Code</span>
          </button>
          <button class="compose-btn" onclick="openSheet('question')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/>
              <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
            <span>Question</span>
          </button>
        </div>
      </div>

      <div id="feed">
        <div class="skel-card">
          <div style="display:flex;gap:.65rem;margin-bottom:.7rem">
            <div class="skel" style="width:32px;height:32px;border-radius:50%;flex-shrink:0"></div>
            <div style="flex:1">
              <div class="skel skel-line" style="width:38%"></div>
              <div class="skel skel-line" style="width:24%"></div>
            </div>
          </div>
          <div class="skel skel-line" style="width:94%"></div>
          <div class="skel skel-line" style="width:68%"></div>
        </div>
        <div class="skel-card">
          <div style="display:flex;gap:.65rem;margin-bottom:.7rem">
            <div class="skel" style="width:32px;height:32px;border-radius:50%;flex-shrink:0"></div>
            <div style="flex:1">
              <div class="skel skel-line" style="width:44%"></div>
              <div class="skel skel-line" style="width:26%"></div>
            </div>
          </div>
          <div class="skel skel-line" style="width:88%"></div>
          <div class="skel skel-line" style="width:54%"></div>
        </div>
      </div>
    </div>
  </div>

  <nav class="nav">
    <a href="feed.html" class="nav-link active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
        <path d="M9 21V12h6v9"/>
      </svg>Fil
    </a>
    <a href="groups.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
      </svg>Groupes
    </a>
    <a href="messages.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
      </svg>Messages
    </a>
    <a href="profile.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>Profil
    </a>
  </nav>

  <!-- Sheet nouveau post -->
  <div class="overlay" id="postOverlay">
    <div class="sheet">
      <div class="handle"></div>
      <div class="sheet-title">Nouveau post</div>

      <div class="field" style="margin-bottom:.75rem">
        <textarea class="input" id="postText"
          placeholder="Partage une idée, une astuce, une question…" rows="4"></textarea>
      </div>

      <label style="display:flex;align-items:center;gap:.45rem;cursor:pointer;font-size:.82rem;color:var(--t3);margin-bottom:.75rem">
        <input type="checkbox" id="isCode" onchange="toggleCode()"
          style="accent-color:var(--green);width:14px;height:14px"/>
        Ajouter un snippet de code
      </label>

      <div id="langRow" style="display:none" class="field">
        <label>Langage</label>
        <select class="input" id="postLang">
          <option value="">Sélectionner…</option>
          <option>Python</option><option>JavaScript</option><option>TypeScript</option>
          <option>Java</option><option>C / C++</option><option>PHP</option>
          <option>Kotlin</option><option>Dart</option><option>Go</option>
          <option>Rust</option><option>Swift</option><option>SQL</option><option>HTML/CSS</option>
        </select>
      </div>

      <div id="codeRow" style="display:none" class="field">
        <label>Code</label>
        <textarea class="input" id="postCode" placeholder="// Ton code ici…" rows="7"
          style="font-family:'DM Mono',monospace;font-size:.77rem;line-height:1.6"></textarea>
      </div>

      <div style="display:flex;gap:.55rem;margin-top:.3rem">
        <button class="btn btn-ghost" onclick="closeSheet()">Annuler</button>
        <button class="btn btn-primary btn-w" id="pubBtn" onclick="publish()">Publier</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { supabase, getOrCreateProfile } from './js/supabase-config.js';
    import { toast, esc, timeAgo, resize, haptic, btnLoad, btnReset, initApp } from './js/app.js';
    let me = null, myProfile = null;

    const { data:{ session } } = await supabase.auth.getSession();
    if (!session) { window.location.replace('login.html'); }
    else {
      me = session.user;
      const { profile } = await getOrCreateProfile(me);
      myProfile = profile;
      if (!myProfile?.pseudo) { window.location.replace('register.html'); }
      else {
        const av = document.getElementById('myAvatar');
        av.textContent = myProfile.prenom.charAt(0).toUpperCase();
        av.className = `av av-sm ${myProfile.avatar_color || 'av-cyan'}`;
        loadFeed();
        subscribeRT();
      }
    }

    /* ── Feed ── */
    async function loadFeed() {
      const { data: posts } = await supabase
        .from('posts').select('*')
        .order('created_at', { ascending: false }).limit(40);
      const c = document.getElementById('feed');
      if (!posts?.length) {
        c.innerHTML = `<div class="empty">
          <div class="empty-ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
          <h3>Aucun post pour l'instant</h3>
          <p>Sois le premier à partager quelque chose</p>
        </div>`;
        return;
      }
      c.innerHTML = '';
      posts.forEach(p => c.appendChild(buildPost(p)));
    }

    function buildPost(p) {
      const liked = Array.isArray(p.liked_by) && p.liked_by.map(String).includes(me.id);
      const d = document.createElement('div');
      d.className = 'post'; d.dataset.id = p.id;
      const info = [p.filiere, p.niveau].filter(Boolean).join(' · ');
      d.innerHTML = `
        <div class="post-head">
          <div class="av av-sm ${p.author_color || 'av-cyan'}">${(p.author_name || '?').charAt(0)}</div>
          <div class="meta">
            <div class="meta-name">${esc(p.author_name)}<span class="handle">@${esc(p.author_pseudo)}</span></div>
            <div class="meta-sub">${info}${info ? ' · ' : ''}${ago(new Date(p.created_at))}</div>
          </div>
        </div>
        <div class="post-body">${esc(p.text)}</div>
        ${p.has_code ? `
          <div class="post-code-wrap">
            ${p.lang ? `<div class="code-tag">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
              ${esc(p.lang)}
            </div>` : ''}
            <div class="post-code">${esc(p.code)}</div>
          </div>` : ''}
        <div class="post-actions">
          <button class="post-btn${liked ? ' liked' : ''}" onclick="like('${p.id}',${liked})">
            ${liked
              ? `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>`
              : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>`
            }
            ${p.likes || 0}
          </button>
          <button class="post-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
            ${p.comments || 0}
          </button>
          <button class="post-btn" onclick="share('${p.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            Partager
          </button>
        </div>`;
      return d;
    }

    function subscribeRT() {
      supabase.channel('feed')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'posts' }, ({ new: p }) => {
          const c = document.getElementById('feed');
          if (c.querySelector('.empty')) c.innerHTML = '';
          c.prepend(buildPost(p));
        })
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'posts' }, ({ new: p }) => {
          const el = document.querySelector(`.post[data-id="${p.id}"]`);
          if (el) el.replaceWith(buildPost(p));
        })
        .subscribe();
    }

    window.like = async (id, liked) => {
      const { data: p } = await supabase.from('posts').select('liked_by').eq('id', id).single();
      if (!p) return;
      const lb = (p.liked_by || []).map(String);
      const next = liked ? lb.filter(x => x !== me.id) : [...lb, me.id];
      await supabase.from('posts').update({ likes: next.length, liked_by: next }).eq('id', id);
    };

    window.share = id => {
      const url = location.origin + location.pathname + '#' + id;
      navigator.share ? navigator.share({ title: 'DevNet', url }) : (navigator.clipboard?.writeText(url), toast('Lien copié'));
    };

    window.openSheet = (type = 'text') => {
      document.getElementById('postOverlay').classList.add('open');
      const ta = document.getElementById('postText');
      ta.placeholder = type === 'question' ? 'Pose ta question…' : 'Partage une idée, une astuce…';
      if (type === 'code') { document.getElementById('isCode').checked = true; toggleCode(); }
      setTimeout(() => ta.focus(), 320);
    };
    window.closeSheet = () => {
      document.getElementById('postOverlay').classList.remove('open');
      document.getElementById('postText').value = '';
      document.getElementById('postCode').value = '';
      document.getElementById('isCode').checked = false;
      toggleCode();
    };
    window.toggleCode = () => {
      const on = document.getElementById('isCode').checked;
      document.getElementById('langRow').style.display = on ? 'block' : 'none';
      document.getElementById('codeRow').style.display = on ? 'block' : 'none';
    };
    window.publish = async () => {
      const text   = document.getElementById('postText').value.trim();
      const isCode = document.getElementById('isCode').checked;
      const code   = document.getElementById('postCode').value.trim();
      const lang   = document.getElementById('postLang').value;
      const btn    = document.getElementById('pubBtn');
      if (!text) { toast('Écris quelque chose', 'err'); return; }
      btn.disabled = true; btn.innerHTML = '<span class="spin"></span>';
      const { error } = await supabase.from('posts').insert({
        author_id: me.id, author_name: myProfile.prenom,
        author_pseudo: myProfile.pseudo, author_color: myProfile.avatar_color,
        filiere: myProfile.filiere || '', niveau: myProfile.niveau || '',
        text, has_code: isCode && code.length > 0,
        code: isCode ? code : '', lang: isCode ? lang : ''
      });
      btn.disabled = false; btn.textContent = 'Publier';
      if (error) toast('Erreur : ' + error.message, 'err');
      else { closeSheet(); toast('Publié'); }
    };

    
      t.textContent = msg; t.className = `toast ${type} show`;
      clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 3000);
    };
    
    
      initApp();
  </script>
</body>
</html>
